<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch Web Application</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #display {
            font-size: 40px;
            margin: 20px 0;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.8;
        }

        .laps {
            margin-top: 20px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .laps li {
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Stopwatch</h1>

        <div id="display">00:00:00</div>

        <button onclick="startStopwatch()">Start</button>
        <button onclick="pauseStopwatch()">Pause</button>
        <button onclick="resetStopwatch()">Reset</button>
        <button onclick="recordLap()">Lap</button>

        <ul id="lapTimes" class="laps"></ul>
    </div>

    <script>
        let seconds = 0;
        let minutes = 0;
        let hours = 0;
        let timer = null;

        function updateDisplay() {
            let h = hours < 10 ? "0" + hours : hours;
            let m = minutes < 10 ? "0" + minutes : minutes;
            let s = seconds < 10 ? "0" + seconds : seconds;

            document.getElementById("display").innerText =
                `${h}:${m}:${s}`;
        }

        function startStopwatch() {
            if (timer !== null) return;

            timer = setInterval(() => {
                seconds++;

                if (seconds === 60) {
                    seconds = 0;
                    minutes++;
                }

                if (minutes === 60) {
                    minutes = 0;
                    hours++;
                }

                updateDisplay();
            }, 1000);
        }

        function pauseStopwatch() {
            clearInterval(timer);
            timer = null;
        }

        function resetStopwatch() {
            clearInterval(timer);
            timer = null;

            seconds = 0;
            minutes = 0;
            hours = 0;

            updateDisplay();

            document.getElementById("lapTimes").innerHTML = "";
        }

        function recordLap() {
            const lap = document.createElement("li");
            lap.textContent =
                document.getElementById("display").innerText;

            document.getElementById("lapTimes").appendChild(lap);
        }
    </script>

</body>
</html>
